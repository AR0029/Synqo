name: synqo
description: Modern collaborative task management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.9.5
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D0D0E"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#0D0D0E"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#0D0D0E"
    color: "#0D0D0E"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
